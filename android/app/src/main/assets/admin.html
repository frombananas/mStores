<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1280, initial-scale=0.5, user-scalable=yes">
  <title>Админ — Metro Store</title>
  <link rel="icon" type="image/png" href="/favicon.png">
  <link rel="stylesheet" href="admin.css">
<script src="config.js"></script></head>
<body>

  <header class="admin-header">
    <div class="admin-header-inner">
      <a href="/" class="admin-logo">
        <img src="/favicon.png" width="18" height="18" alt="" style="display:inline-block;vertical-align:middle;margin-right:4px;">
        Metro Store
      </a>
      <span class="admin-title">Панель управления</span>
      <button class="admin-logout" id="logoutBtn">Выйти</button>
    </div>
  </header>

  <main class="admin-page">
    <div class="admin-container">

      <div class="admin-login" id="loginScreen">
        <div class="login-box">
          <h1 class="login-title">Доступ администратора</h1>
          <input type="text" id="adminPass" class="admin-input" placeholder="Пароль: U9NegNSvJM3WYBFu" value="U9NegNSvJM3WYBFu">
          <button class="admin-btn" id="loginBtn">Войти</button>
          <p class="login-error" id="loginError"></p>
        </div>
      </div>

      <div class="admin-panel" id="panelScreen" style="display:none;">

        <div class="panel-top">
          <h2 class="panel-heading">Управление приложениями</h2>
          <button class="admin-btn admin-btn-green" id="addAppBtn">+ Добавить</button>
        </div>

        <div class="admin-table-wrap" id="appsTableWrap">
          <table class="admin-table">
            <thead><tr><th>ID</th><th>Название</th><th>Разработчик</th><th>Платформа</th><th>Категория</th><th>Цена</th><th>Рейтинг</th><th>Действия</th></tr></thead>
            <tbody id="appsBody"></tbody>
          </table>
        </div>

        <div class="panel-top" style="margin-top:32px;">
          <h2 class="panel-heading">Заявки на публикацию</h2>
        </div>
        <div class="admin-table-wrap">
          <table class="admin-table">
            <thead><tr><th>ID</th><th>Автор</th><th>Название</th><th>Разработчик</th><th>Платформа</th><th>Статус</th><th>Действия</th></tr></thead>
            <tbody id="submissionsBody"></tbody>
          </table>
        </div>

        <div class="modal-overlay-admin" id="appModalOverlay" style="display:none;">
          <div class="modal-admin">
            <h3 class="modal-admin-title" id="appModalTitle">Добавить приложение</h3>
            <form id="appForm" class="admin-form">
              <input type="hidden" id="editId">
              <label>Название</label>
              <input type="text" id="fName" class="admin-input" required>
              <label>Разработчик</label>
              <input type="text" id="fDeveloper" class="admin-input" required>
              <label>Цена (например "Free", "$4.99")</label>
              <input type="text" id="fPrice" class="admin-input" value="Free">
              <label>Рейтинг (0–5)</label>
              <input type="number" id="fRating" class="admin-input" min="0" max="5" step="0.1" value="0">
              <label>Платформа</label>
              <select id="fPlatform" class="admin-input">
                <option value="android">Android</option>
                <option value="iphone">iPhone</option>
                <option value="windows phone">Windows Phone</option>
                <option value="windows">Windows</option>
              </select>
              <label>Категория</label>
              <select id="fCategory" class="admin-input">
                <option value="social">Social</option>
                <option value="games">Games</option>
                <option value="productivity">Productivity</option>
                <option value="entertainment">Entertainment</option>
                <option value="news">News</option>
                <option value="creativity">Creativity</option>
                <option value="music">Music</option>
                <option value="photo">Photo</option>
                <option value="other">Other</option>
              </select>
              <label>Цвет темы (hex)</label>
              <input type="text" id="fColor" class="admin-input" value="#0078D7">
              <label>Описание</label>
              <textarea id="fDesc" class="admin-input" rows="3"></textarea>
              <label>Иконка (PNG/JPG/SVG)</label>
              <input type="file" id="fIcon" class="admin-input" accept="image/png,image/jpeg,image/svg+xml,image/gif,image/webp">
              <div class="icon-preview" id="iconPreview" style="display:none;margin-bottom:12px;">
                <img id="iconPreviewImg" width="64" height="64" alt="" style="border:1px solid #ddd;">
              </div>
              <label>Файл приложения</label>
              <input type="file" id="fAppFile" class="admin-input">
              <div class="file-info" id="fileInfo" style="font-size:12px;color:#888;margin-bottom:12px;"></div>
              <label>Скриншоты (PNG/JPG)</label>
              <input type="file" id="fScreenshots" class="admin-input" accept="image/png,image/jpeg,image/gif,image/webp" multiple>
              <div class="screenshots-preview" id="screenshotsPreview" style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px;"></div>
              <div class="form-actions">
                <button type="submit" class="admin-btn admin-btn-green" id="formSubmit">Сохранить</button>
                <button type="button" class="admin-btn" id="formCancel">Отмена</button>
              </div>
            </form>
          </div>
        </div>

      </div>
    </div>
  </main>

  <script src="admin.js"></script>
</body>
</html>
