<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>OpenVK</title>
  <link rel="stylesheet" href="social.css">
</head>
<body>

<header class="vk-header">
  <div class="vk-header-inner">
    <a href="social.html" class="vk-logo">OpenVK</a>
    <input type="text" class="vk-search" id="searchInput" placeholder="Поиск">
    <div class="vk-header-right" id="headerRight">
      <a href="../index.html" style="color:#fff;font-size:13px;">Магазин</a>
    </div>
  </div>
</header>

<div class="vk-layout">
  <nav class="vk-menu" id="sideMenu">
    <a href="#" class="vk-menu-item active" data-page="profile">Моя страница</a>
    <a href="#" class="vk-menu-item" data-page="news">Новости</a>
    <a href="#" class="vk-menu-item" data-page="friends">Друзья</a>
    <a href="#" class="vk-menu-item" data-page="search">Поиск людей</a>
  </nav>

  <main class="vk-content" id="mainContent">
    <!-- Profile / News / Friends loaded here -->
  </main>
</div>

<div class="vk-overlay" id="authOverlay">
  <div class="vk-auth-box">
    <h2>OpenVK</h2>
    <div class="vk-auth-tabs">
      <button class="vk-tab active" data-tab="login">Вход</button>
      <button class="vk-tab" data-tab="register">Регистрация</button>
    </div>
    <div id="loginForm">
      <input type="text" id="loginUser" class="vk-input" placeholder="Логин">
      <input type="password" id="loginPass" class="vk-input" placeholder="Пароль">
      <button class="vk-btn" id="loginBtn">Войти</button>
      <p class="vk-msg" id="loginMsg"></p>
    </div>
    <div id="registerForm" style="display:none">
      <input type="text" id="regUser" class="vk-input" placeholder="Логин">
      <input type="text" id="regName" class="vk-input" placeholder="Имя">
      <input type="password" id="regPass" class="vk-input" placeholder="Пароль">
      <button class="vk-btn" id="registerBtn">Зарегистрироваться</button>
      <p class="vk-msg" id="regMsg"></p>
    </div>
  </div>
</div>

<script src="config.js"></script>
<script src="social.js"></script>
</body>
</html>
